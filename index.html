</head>
<body>
    <div class="user-info">
        <div class="user-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
        <div class="info-text">
            <span class="label">Player</span>
            <span class="name" id="username">Loading...</span>
        </div>
    </div>

    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        Logout
    </button>

    <h1>BlinkBrain</h1>
    <h2>Tap Start or press any key to begin</h2>
    <div class="game-controls">
        <button id="mode-btn" class="mode-btn" type="button">Mode: Solo</button>
        <button id="difficulty-btn" class="mode-btn" type="button">Difficulty: Normal</button>
        <button id="timer-btn" class="mode-btn" type="button">Timer: Off</button>
        <button id="sound-btn" class="mode-btn" type="button">Sound: On</button>
        <button id="pause-btn" class="mode-btn" type="button">Pause</button>
        <button id="start-btn" class="start-btn" type="button">Start Game</button>
    </div>
    <h3 id="player-score" class="player-score hidden">P1: 0 | P2: 0</h3>
    <h3 id="timer-display" class="timer-display hidden">Time: --</h3>
    <h3 id="high-score">High Score: 0</h3>
    <div id="confetti-container" class="confetti-container"></div>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn red " type="button" id="red"></div>
            <div class="btn yellow " type="button" id="yellow"></div>
        </div>
        <div class="line-two">
            <div class="btn green " type="button" id="green"></div>
            <div class="btn purple " type="button" id = "purple"></div>
        </div>

    </div>
    <script>
        // Check auth on page load
        window.addEventListener('load', async () => {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('username').textContent = user.displayName;
                    document.getElementById('high-score').textContent = 'High Score: ' + user.highScore;
                } else {
                    // Not authenticated, redirect to login
                    window.location.href = '/login.html';
                }
            } catch (err) {
                console.error('Auth check failed:', err);
                window.location.href = '/login.html';
            }
        });

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (err) {
                console.error('Logout failed:', err);
            }
        }

        // Save high score to server when game ends
        async function saveHighScore(score) {
            try {
                await fetch('/api/highscore', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score }),
                });
            } catch (err) {
                console.error('Failed to save high score:', err);
            }
        }
    </script>
    <script src="./app.js"></script>
</body>
</html>
